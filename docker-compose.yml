services:
  postgres:
    image: postgres:16-alpine
    container_name: socialflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-socialflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-socialflow_dev}
      POSTGRES_DB: ${DB_NAME:-socialflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-socialflow} -d ${DB_NAME:-socialflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: socialflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nestjs_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: socialflow-nestjs-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-socialflow}
      DB_PASSWORD: ${DB_PASSWORD:-socialflow_dev}
      DB_NAME: ${DB_NAME:-socialflow}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_prod}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev_encryption_key_change_in_prod}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    command: npm run start:dev
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10

  fastapi_worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    container_name: socialflow-fastapi-worker
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-socialflow}
      DB_PASSWORD: ${DB_PASSWORD:-socialflow_dev}
      DB_NAME: ${DB_NAME:-socialflow}
      DATABASE_URL: postgresql://${DB_USER:-socialflow}:${DB_PASSWORD:-socialflow_dev}@postgres:5432/${DB_NAME:-socialflow}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      TREND_TEST_MODE: ${TREND_TEST_MODE:-1}
      VIDEO_OUTPUT_DIR: /app/output
      STOCK_VIDEO_PATH: /app/assets/stock_background.mp4
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8001:8001"
    volumes:
      - ai_worker_output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10

  flask_uploader:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: socialflow-flask-uploader
    restart: unless-stopped
    environment:
      FLASK_PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-socialflow}
      DB_PASSWORD: ${DB_PASSWORD:-socialflow_dev}
      DB_NAME: ${DB_NAME:-socialflow}
      DATABASE_URL: postgresql://${DB_USER:-socialflow}:${DB_PASSWORD:-socialflow_dev}@postgres:5432/${DB_NAME:-socialflow}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev_encryption_key_change_in_prod}
      FB_HEADLESS: ${FB_HEADLESS:-1}
      FB_UPLOAD_TIMEOUT_MS: ${FB_UPLOAD_TIMEOUT_MS:-300000}
      FB_ACTION_TIMEOUT_MS: ${FB_ACTION_TIMEOUT_MS:-30000}
      ERROR_LOGS_DIR: /app/error_logs
    ports:
      - "5000:5000"
    volumes:
      - flask_error_logs:/app/error_logs
      - flask_video_files:/app/videoFile
      - flask_cookie_files:/app/cookiesFile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  ai_worker_output:
  flask_error_logs:
  flask_video_files:
  flask_cookie_files:

networks:
  default:
    name: socialflow-network
