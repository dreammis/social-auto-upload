name: Sync upstream

# Mirror https://github.com/dreammis/social-auto-upload (main) into this repo's
# `upstream` branch. MUST NOT touch `main` or any other branch.

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:        # manual trigger for backfill / debugging

permissions:
  contents: write           # required to push back to origin/upstream

jobs:
  sync:
    name: Sync origin/upstream with dreammis/social-auto-upload@main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main as a base (shallow)
        # Use `ref: main` rather than `ref: upstream` to avoid the
        # `+refs/heads/upstream*:...` refspec that actions/checkout emits,
        # which fails (exit 1) when origin/upstream does not yet exist.
        # The local `upstream` branch is created/reset in a later step.
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/dreammis/social-auto-upload.git

      - name: Fetch upstream main
        # No --depth: a shallow commit cannot be pushed to a full repo
        # (remote fails with "did not receive expected object" during
        # index-pack). The mirror is small, full history is cheap.
        run: git fetch upstream main

      - name: Create or reset local upstream branch to upstream/main
        run: |
          git branch -f upstream FETCH_HEAD
          git checkout upstream

      - name: Force-push to origin/upstream only
        # --force-with-lease is safer than --force: refuses to clobber
        # origin/upstream if someone else has updated it since our last fetch.
        run: git push origin upstream --force-with-lease
