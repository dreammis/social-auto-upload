name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 同一分支重复推送时，取消上一次未完成的运行
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # requirements.txt 与 pyproject 各有缺漏、互补：
        # requirements 有 playwright/xhs 但缺 patchright；pyproject[web] 反之。
        # 两者并集才能 import 全部 uploader + myUtils。
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[web]"

      - name: Prepare conf.py
        # conf.py 被 gitignore，CI 检出没有它；按项目约定从示例复制一份
        run: cp conf.example.py conf.py

      - name: Byte-compile sources
        # 全量编译，任何语法错误都会让 CI 失败
        run: python -m compileall -q sau_backend.py sau_cli.py conf.example.py myUtils uploader utils

      - name: Import smoke test
        # 确认核心入口可导入（依赖、相对导入是否正确）
        run: python -c "import sau_cli; import myUtils.auth"

  frontend:
    name: Frontend (Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sau_frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
